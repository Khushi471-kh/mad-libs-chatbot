<!DOCTYPE html>
<html>
<head>
    <title>Mad Libs Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background-color: #cfc835;
            text-align: center;
        }
        #chatbox {
            width: 400px;
            height: 400px;
            border: 1px solid #741986;
            margin: 20px auto;
            padding: 10px;
            overflow-y: auto;
            background: rgb(97, 73, 158);
        }
        input {
            width: 70%;
            padding: 8px;
        }
        button {
            padding: 8px 12px;
        }
    </style>
</head>
<body>

<h2>Mad Libs Bot 🎉</h2>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type here..." />
<button onclick="sendMessage()">Send</button>

<script>
    let step = 0;
    let noun = "";
    let verb = "";
    let adjective = "";

    function sendMessage() {
        const input = document.getElementById("userInput");
        const chatbox = document.getElementById("chatbox");

        let message = input.value;
        chatbox.innerHTML += "<p><b>You:</b> " + message + "</p>";

        if (step === 0) {
            chatbox.innerHTML += "<p><b>Bot:</b> Give me a noun!</p>";
            step++;
        } else if (step === 1) {
            noun = message;
            chatbox.innerHTML += "<p><b>Bot:</b> Now give me a verb!</p>";
            step++;
        } else if (step === 2) {
            verb = message;
            chatbox.innerHTML += "<p><b>Bot:</b> Finally, give me an adjective!</p>";
            step++;
        } else if (step === 3) {
            adjective = message;
            chatbox.innerHTML += "<p><b>Bot:</b> Here's your story: The " + adjective + " " + noun + " loves to " + verb + " every morning! 🎉</p>";
            step = 0;
        }

        input.value = "";
        chatbox.scrollTop = chatbox.scrollHeight;
    }
</script>

</body>
</html>
